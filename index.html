<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>日本退稅計算機｜免稅＋手續費完整計算</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;max-width:700px;margin:auto;padding:20px;background:#fafafa;}
input,select,button{font-size:16px;padding:10px;margin:8px 0;width:100%;border-radius:8px;border:1px solid #ccc;}
button{background:#e53935;color:white;font-weight:bold;border:none;}
.card{background:white;padding:15px;border-radius:12px;margin-top:15px;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.big{font-size:26px;font-weight:bold;color:#e53935;}
.green{color:#2e7d32;font-weight:bold;}
.note{font-size:13px;color:#666;}
footer{margin-top:30px;font-size:14px;text-align:center;}
</style>
</head>

<body>

<h1>日本退稅計算機</h1>

<div class="card">

<label>金額（日圓）</label>
<input id="price" type="number">

<label>價格類型</label>
<select id="taxType">
<option value="tax">含稅</option>
<option value="noTax">未稅</option>
</select>

<label>店鋪手續費 (%)</label>
<input id="shopFee" type="number" value="0">
<div class="note">藥妝0%，百貨約1.55%</div>

<label>信用卡手續費 (%)</label>
<input id="cardFee" type="number" value="1.5">

<label>匯率</label>
<input id="rate" type="number" step="0.01" value="0.22">

<button onclick="calc()">計算</button>

</div>


<div id="result" style="display:none;">

<div class="card">
<h2>💰 退稅金額（你省了）</h2>
<div id="save" class="big"></div>
<p class="note">與含稅價格相比</p>
</div>

<div class="card">
<h2>明細</h2>
<p>原始價格：<span id="orig"></span></p>
<p>未稅價格：<span id="noTax"></span></p>
<p>店鋪手續費：<span id="shopCost"></span></p>
<p>信用卡手續費：<span id="cardCost"></span></p>
</div>

<div class="card">
<h2>最終支付</h2>
<p class="green" id="finalYen"></p>
<p id="twd"></p>
</div>

</div>


<script>
function calc(){

let price=parseFloat(document.getElementById("price").value)
let taxType=document.getElementById("taxType").value
let shopFee=parseFloat(document.getElementById("shopFee").value)/100
let cardFee=parseFloat(document.getElementById("cardFee").value)/100
let rate=parseFloat(document.getElementById("rate").value)

let noTax = taxType=="tax" ? price/1.1 : price

let shopCost=noTax*shopFee
let base=noTax+shopCost
let cardCost=base*cardFee
let finalYen=base+cardCost
let save=price-noTax
let twd=finalYen*rate

document.getElementById("result").style.display="block"

document.getElementById("save").innerHTML=save.toFixed(0)+" 日圓"
document.getElementById("orig").innerHTML=price.toFixed(0)+" 日圓"
document.getElementById("noTax").innerHTML=noTax.toFixed(0)+" 日圓"
document.getElementById("shopCost").innerHTML=shopCost.toFixed(0)+" 日圓"
document.getElementById("cardCost").innerHTML=cardCost.toFixed(0)+" 日圓"
document.getElementById("finalYen").innerHTML=finalYen.toFixed(0)+" 日圓"
document.getElementById("twd").innerHTML="約台幣 "+twd.toFixed(0)+" 元"

}
</script>


<footer>
<a href="about.html">關於我們</a> |
<a href="privacy.html">隱私政策</a> |
<a href="guide.html">退稅教學</a>
</footer>

</body>
</html>
