<h1>日本退稅怎麼算？</h1>

<p>
日本消費稅為10%，購物滿5000日圓可免稅。
</p>

<p>
計算方式：
含稅價格 ÷ 1.1 = 未稅價格。
</p>

<p>
百貨公司可能收取約1.55%手續費，
信用卡約1%~2%手續費。
</p>
